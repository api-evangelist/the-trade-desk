- aid: the-trade-desk:the-trade-desk-data-api
  name: The Trade Desk Data API
  description: The Trade Desk Data API enables data providers and advertisers to upload
    first-party and third-party audience segments (CRM data), manage data integrations,
    access commerce solutions, and retrieve reporting data. Supports uploading hashed
    contact lists (email, phone) via S3 signed URLs for audience targeting, and provides
    access to data segment management and third-party data rate information.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
