- aid: the-trade-desk:the-trade-desk-real-time-conversions-api
  name: The Trade Desk Real-Time Conversions API
  description: The Trade Desk Real-Time Conversions API (formerly the Real-Time Conversion
    Events API) allows advertisers to send conversion events server-side in real time,
    enabling more accurate attribution, cross-device measurement, and campaign optimization.
    It supports sending hashed email and phone identifiers along with event data for
    impression-to-conversion tracking without relying on browser cookies.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://partner.thetradedesk.com/v3/portal/api/overview
  baseURL: https://api.thetradedesk.com/v3
