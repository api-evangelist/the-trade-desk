- aid: the-trade-desk:the-trade-desk-reporting-api
  name: The Trade Desk Reporting API
  description: The Trade Desk Reporting API provides programmatic access to campaign
    performance data including impressions, clicks, conversions, spend, win rates,
    viewability, effective CPM, completion rates, and 200+ additional metrics and
    dimensions. Supports incremental data sync for campaign, ad group, ad, creative,
    and targeting performance at configurable granularity levels.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
