apis:
- aid: the-trade-desk:the-trade-desk-platform-api
  name: The Trade Desk Platform API
  description: The Trade Desk Platform API provides REST and GraphQL interfaces for
    programmatically managing all aspects of programmatic advertising campaigns. Key
    resources include advertisers, campaigns, ad groups, creatives, bid lists, frequency
    caps, activity logs, and targeting configurations. Authentication uses token-based
    credentials obtained via POST to the /v3/authentication endpoint, with the token
    passed as a TTD-Auth header or Bearer token in subsequent requests.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
