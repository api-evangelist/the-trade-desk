aid: the-trade-desk
name: The Trade Desk
description: The Trade Desk is a global programmatic advertising platform and demand-side
  platform (DSP) that enables advertisers, agencies, and media buyers to plan, manage,
  and optimize digital advertising campaigns across connected TV, display, video,
  audio, native, and mobile channels. The platform provides REST and GraphQL APIs
  for managing advertisers, campaigns, ad groups, creatives, targeting, bidding strategies,
  audience data segments, and campaign performance reporting at scale.
type: Index
